openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: subscribers
    description: Email subscriber operations
  - name: admin
    description: Admin operations
  - name: guides
    description: Guide operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /subscribers:
    post:
      operationId: createSubscriber
      tags: [subscribers]
      summary: Subscribe with email
      description: Adds an email address to the subscriber list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriberInput"
      responses:
        "201":
          description: Successfully subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "409":
          description: Email already subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
        "401":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
  /admin/status:
    get:
      operationId: getAdminStatus
      tags: [admin]
      summary: Get admin auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
  /admin/subscribers:
    get:
      operationId: listSubscribers
      tags: [admin]
      summary: List all subscribers (admin only)
      responses:
        "200":
          description: Subscriber list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /guides/status:
    get:
      operationId: getGuidesStatus
      tags: [guides]
      summary: Get upload status for all guides
      responses:
        "200":
          description: Guide status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuideStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SubscriberInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    Subscriber:
      type: object
      required:
        - id
        - email
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    AdminLoginInput:
      type: object
      required:
        - password
      properties:
        password:
          type: string
    AdminStatus:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
    GuideStatus:
      type: object
      required:
        - id
        - title
        - hasFile
      properties:
        id:
          type: string
        title:
          type: string
        hasFile:
          type: boolean
        fileName:
          type: ["string", "null"]
